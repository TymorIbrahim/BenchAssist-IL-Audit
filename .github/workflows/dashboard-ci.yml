name: Dashboard CI

on:
  push:
    paths:
      - "web_dashboard/**"
      - "src/benchassist/**"
      - "tests/**"
      - ".github/workflows/dashboard-ci.yml"
  pull_request:
    paths:
      - "web_dashboard/**"
      - "src/benchassist/**"
      - "tests/**"

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: python -m pytest -q
      - run: python -m benchassist.validate_dashboard_export --data-dir web_dashboard/public/data

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web_dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web_dashboard/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run validate:data
      - run: npm run build
      - run: bash ../scripts/scan_dashboard_secrets.sh
      - run: npx playwright install chromium --with-deps
      - run: npm run test:e2e
