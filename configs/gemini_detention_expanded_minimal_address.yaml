# BenchAssist-IL Detention Audit — EXPANDED MINIMAL + ADDRESS proxy-cautious Gemini run
# Preflight (corpus + dry-run + go/no-go):  make detention-preflight
# Dry-run only:  python -m benchassist.detention_full_run_plan --config configs/gemini_detention_expanded_minimal_address.yaml --dry-run
# Execute:  python -m benchassist.detention_gemini_full --config configs/gemini_detention_expanded_minimal_address.yaml --resume
# Post-run (analysis + dashboard):  make detention-post-run
# DO NOT execute until preflight report recommends READY_FOR_MINIMAL_ADDRESS_GEMINI_RUN: YES

use_case: detention
model: gemini-2.5-flash-lite
schema_version: detention_minimal_dangerousness_v2

prompt_modes:
  - baseline
  - fairness_aware
  - demographic_blind

grounded:
  enabled: false
  prompt_mode: grounded

dataset:
  synthetic_input: data/synthetic/detention_core_cases_with_address.csv
  variant_set: slim
  # Regenerate: python -m benchassist.detention_data_generation --variant-set slim --include-address-variants --max-base-cases 80
  max_base_cases: 80
  real_case_input: data/real_cases/detention/pilot_corpus/detention_pilot_bench_inputs.csv

output_dir: results/gemini/detention_expanded_minimal_address

max_synthetic_base_cases: null
max_variants_per_base_case: null
max_real_cases: 0

temperature: 0
top_p: 1
max_output_tokens: 4096
request_timeout_seconds: 120

rate_limit:
  requests_per_minute: 600
  retry_with_backoff: true
  min_delay_seconds: 0.1

cost_estimates:
  input_tokens_per_call: 1600
  output_tokens_per_call: 500
  input_cost_per_million: 0.10
  output_cost_per_million: 0.40
  caution: "Expanded minimal-schema run cost estimate — approximate only; actual billing may differ."

safety:
  dry_run_required: true
  overwrite_existing: false
  resume_supported: true
  print_api_key: false
  strict_schema_validation: true
  stop_on_parse_error_rate_above: 0.10

methodology:
  strict_fairness_source: synthetic_counterfactual_only
  real_cases_in_strict_rates: false
  address_proxy_in_strict_rates: false
  real_cases_use: realism_legal_reliability_grounding_qualitative_review

dashboard:
  export_after_run: true
  data_status: gemini_minimal_address
  full_text_internal_only: true
  access_control_required: true

metadata:
  project: BenchAssist-IL Detention Audit
  run_type: expanded_minimal_address
  expanded_run: true
  schema_version: detention_minimal_dangerousness_v2
  flagging_policy: dangerousness_level_change_only
  flagging_policy_doc: docs/detention_flagging_policy.md
  strict_fairness_source: synthetic_counterfactual_only
  real_cases_in_strict_rates: false
  address_proxy_in_strict_rates: false

notes: |
  Expanded synthetic corpus with core counterfactual variants plus proxy-cautious address variants.
  Model output schema: case_summary, dangerousness_level, reasoning_text only.
  Address variants excluded from strict fairness rates by default.
  Audit signals require human legal review — not proof of unlawful discrimination.
  Methodology Constraint: Cross-lingual reasoning. Input cases are strictly in Hebrew, but system instructions and schemas are in English to maximize JSON compliance.
