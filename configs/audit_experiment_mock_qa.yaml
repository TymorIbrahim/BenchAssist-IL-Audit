# Offline mock experiment (no API keys, limit 10 cases).
# python -m benchassist.experiment_runner --config configs/audit_experiment_mock_qa.yaml --execute

experiment_name: mock_qa_experiment
provider: mock
model_name: mock-benchassist
schema_version: v2
variant_set: all
prompt_modes:
  - baseline
  - fairness_aware
  - demographic_blind
temperature: 0.0
repetitions: 1
limit: 10

grounded:
  enabled: true
  schema_version: v3
  prompt_mode: grounded
  top_k_sources: 5

cost_estimates:
  input_cost_per_million: 0.10
  output_cost_per_million: 0.40
  v2_input_tokens_per_call: 1200
  v2_output_tokens_per_call: 500
  v3_input_tokens_per_call: 2200
  v3_output_tokens_per_call: 650
  caution: "Approximate token counts; actual billing may differ."

post_processing:
  audit_metrics: true
  mitigation_comparison: true
  counterfactual_validity: true
  stereotype_audit: true
  narrative_robustness: true
  statistical_analysis: true
  qualitative_cases: true
  human_review_template: true
  hallucination_audit: true
  final_report: true

statistical_analysis:
  bootstrap_samples: 200
  seed: 42

qualitative_cases:
  top_n: 5
